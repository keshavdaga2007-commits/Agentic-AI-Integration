<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Transaction — Finance Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-logo">Finance<span>Tracker</span></div>
      <ul class="nav-list">
        <li><a href="dashboard.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a></li>
        <li><a href="add-transaction.html" class="nav-item active"><span class="icon">➕</span> Add Transaction</a></li>
        <li><a href="history.html" class="nav-item"><span class="icon">📜</span> History</a></li>
        <li><a href="reports.html" class="nav-item"><span class="icon">📊</span> Reports</a></li>
        <li><a href="assistant.html" class="nav-item"><span class="icon">🤖</span> AI Assistant</a></li>
        <li><a href="settings.html" class="nav-item"><span class="icon">⚙️</span> Settings</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1>Add Transaction</h1>
        <p>Log a new income or expense entry.</p>
      </div>

      <div class="card" style="max-width: 460px;">
        <div id="notif" style="display:none; padding:10px 14px; border-radius:8px; font-size:13.5px; font-weight:500; margin-bottom:16px;"></div>

        <form id="txnForm">
          <div class="field">
            <label>Transaction Type</label>
            <div class="type-toggle">
              <button type="button" class="type-btn active-expense" id="btnExpense" data-type="expense">− Expense</button>
              <button type="button" class="type-btn" id="btnIncome" data-type="income">+ Income</button>
            </div>
          </div>

          <div class="field">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="e.g. Groceries, Salary, Rent" required />
          </div>

          <div class="field">
            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" placeholder="0" min="0.01" step="0.01" required />
          </div>

          <div class="field">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="Food">Food</option>
              <option value="Rent">Rent</option>
              <option value="Transport">Transport</option>
              <option value="Utilities">Utilities</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Shopping">Shopping</option>
              <option value="Health">Health</option>
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="field">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>

          <button type="submit" class="btn btn-primary btn-block">Add Transaction</button>
        </form>
      </div>
    </main>

  </div>

  <script src="js/storage.js"></script>
  <script>
    if (getSettings().darkMode) document.documentElement.setAttribute("data-theme", "dark");

    let currentType = "expense";
    const btnExpense = document.getElementById("btnExpense");
    const btnIncome = document.getElementById("btnIncome");

    btnExpense.addEventListener("click", () => setType("expense"));
    btnIncome.addEventListener("click", () => setType("income"));

    function setType(type) {
      currentType = type;
      btnExpense.classList.toggle("active-expense", type === "expense");
      btnIncome.classList.toggle("active-income", type === "income");
    }

    // Default date to today
    document.getElementById("date").value = new Date().toISOString().split("T")[0];

    document.getElementById("txnForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const description = document.getElementById("description").value.trim();
      const amount = parseFloat(document.getElementById("amount").value);
      const category = document.getElementById("category").value;
      const date = document.getElementById("date").value;

      if (!description || !amount || amount <= 0 || !date) {
        showNotif("Please fill in all fields with valid values.", "error");
        return;
      }

      addTransaction({ description, amount, type: currentType, category, date });
      showNotif("Transaction added successfully.", "success");

      document.getElementById("txnForm").reset();
      document.getElementById("date").value = new Date().toISOString().split("T")[0];
      setType("expense");
    });

    function showNotif(msg, type) {
      const el = document.getElementById("notif");
      el.textContent = msg;
      el.style.display = "block";
      el.style.background = type === "success" ? "var(--green-light)" : "var(--red-light)";
      el.style.color = type === "success" ? "var(--green)" : "var(--red)";
      setTimeout(() => { el.style.display = "none"; }, 2500);
    }
  </script>

</body>
</html>
