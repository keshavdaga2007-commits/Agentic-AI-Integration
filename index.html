<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Clean, vanilla styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="login-card">
            <!-- Header -->
            <header class="header">
                <h1 class="title">Sign in to your account</h1>
                <p class="subtitle">Welcome back! Please enter your details.</p>
            </header>

            <!-- Login Form -->
            <form id="loginForm" class="form" autocomplete="on">
                <!-- Email Field -->
                <div class="input-group">
                    <label for="email" class="label">Email address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="you@example.com" 
                        required 
                        autocomplete="email"
                    >
                    <span class="error-text" id="emailError">Please enter a valid email address</span>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <div class="label-row">
                        <label for="password" class="label">Password</label>
                        <a href="#" class="forgot-link" id="forgotPassword">Forgot password?</a>
                    </div>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••" 
                            required 
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            Show
                        </button>
                    </div>
                    <span class="error-text" id="passwordError">Password must be at least 8 characters</span>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="remember-group">
                    <label class="checkbox-label" for="remember">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">Remember me for 30 days</span>
                    </label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="submit-button" id="submitBtn">
                    Sign in
                </button>
            </form>

            <!-- Success Feedback (Initially Hidden) -->
            <div class="alert-success" id="successAlert">
                Signed in successfully!
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const togglePassword = document.getElementById('togglePassword');
            const successAlert = document.getElementById('successAlert');
            const submitBtn = document.getElementById('submitBtn');

            // Toggle Password Visibility
            togglePassword.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                togglePassword.textContent = isPassword ? 'Hide' : 'Show';
            });

            // Email format helper
            function isValidEmail(val) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
            }

            // Real-time Validation styling
            emailInput.addEventListener('input', () => {
                if (emailInput.value === '' || isValidEmail(emailInput.value)) {
                    emailInput.classList.remove('invalid');
                    emailError.classList.remove('show');
                }
            });

            passwordInput.addEventListener('input', () => {
                if (passwordInput.value === '' || passwordInput.value.length >= 8) {
                    passwordInput.classList.remove('invalid');
                    passwordError.classList.remove('show');
                }
            });

            // Form Submit Logic
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let hasErrors = false;

                if (!isValidEmail(emailInput.value)) {
                    emailInput.classList.add('invalid');
                    emailError.classList.add('show');
                    hasErrors = true;
                }

                if (passwordInput.value.length < 8) {
                    passwordInput.classList.add('invalid');
                    passwordError.classList.add('show');
                    hasErrors = true;
                }

                if (!hasErrors) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Signing in...';

                    // Simulate API network call
                    setTimeout(() => {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Sign in';
                        successAlert.classList.add('show');
                        form.reset();
                        togglePassword.textContent = 'Show';

                        setTimeout(() => {
                            successAlert.classList.remove('show');
                        }, 4000);
                    }, 1000);
                }
            });

            // Prevent default for forgot password demo link
            document.getElementById('forgotPassword').addEventListener('click', (e) => {
                e.preventDefault();
                alert('Password reset link would be sent in a production app!');
            });
        });
    </script>
</body>
</html>
