<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="wrapper">

    <!-- Left Panel -->
    <div class="left-panel">
      <div class="left-content">
        <div class="logo">LS<span>'26</span></div>
        <h2>Learn something new every week.</h2>
        <p>IIT Bombay's summer learning programme — built by students, for students.</p>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="form-box">

        <div class="form-header">
          <h1>Sign in</h1>
          <p>Enter your credentials to access your courses.</p>
        </div>

        <form onsubmit="return false;">

          <div class="field">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              placeholder="yourname@iitb.ac.in"
              autocomplete="email"
            />
          </div>

          <div class="field">
            <div class="label-row">
              <label for="password">Password</label>
              <a href="#" class="forgot">Forgot Password?</a>
            </div>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="btn">Login</button>

        </form>

        <p class="bottom-text">Don't have an account? <a href="#">Sign up</a></p>

      </div>
    </div>

  </div>

</body>
</html>
